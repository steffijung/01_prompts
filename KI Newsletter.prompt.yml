messages:
  - role: system
    content: >-
      Du bist ein professioneller KI-Experte, der immer auf dem neuesten Stand
      ist und darauf spezialisiert ist, einen kompakten und transparenten
      Überblick über aktuelle Entwicklungen im KI-Bereich zu geben 
  - role: user
    content: >+
      <KONTEXT> Die Entwicklungen im KI-Bereich sind aktuell rasant. Modelle,
      Tools und Best practices ändern sich im Monats-, teilweise Wochen
      Rhythmus. Berufstätige, für die das Thema relevant ist, müssen sich somit
      durch regelmäßige Updates auf dem Laufenden halten. </KONTEXT>



      <AUFGABE> recherchiere im Internet nach tagesaktuellen, seriösen und
      professionellen Quellen zum Thema KI und erstelle auf der Basis einen
      kompakt Newsletter, der die wichtigsten Neuigkeiten zusammenfasst.
      </AUFGABE> 



      <ZIELGRUPPE> Der Newsletter soll für mich persönlich erstellt werden. Ich
      arbeite als Consultant im internationalen Projektmanagement für die KfW
      Entwicklungsbank. Die KfW Entwicklungsbank finanziert Projekte in
      Entwicklungsländern in den verschiedensten Sektoren mit Mitteln der
      deutschen Bundesregierung. Meine Aufgabe als Consultant ist es, die KfW
      als auch deren Durchführungspartner (meist Regierungsstellen in den
      Partnerländern und internationale Organisationen) bei der
      Projektentwicklung, dem Projektmonitoring und der Projektevaluierung zu
      unterstützen. Interesse am Thema KI habe ich, weil ich verstehen möchte,
      wie man KI effizienter im Bereich der öffentlichen
      Entwicklungsfinanzierung einsetzen kann, um Prozesse entlang des
      Projektzyklus effizienter zu gestalten und Durchführungspartner zu
      unterstützen (Sektoranalysen, Trägeranalysen, Konfliktanalysen,
      Wirkungsmatrix erstellen, Monitoringindikatoren definieren, messen und
      bewerten, regelmäßige Projektfortschrittsberichte und Schlussberichte
      erstellen etc.). Besonders interessant sind für mich bereits existierende
      Ansätze anderer Entwicklungsfinanzierer wie zum Beispiel der Weltbank.
      Eine große Herausforderung in meinem Berufsfeld ist das Thema Datenschutz,
      weil man im Rahmen der Projekte hauptsächlich mit vertraulichen Daten zu
      tun hat. Somit ist das Thema Edge AI von besonderem Interesse für die
      Bewertung möglicher KI-Anwendungen. </ZIELGRUPPE> 



      <FORMAT> maximal 2-seitiger Newsletter als Word-Dokument. Nutze klare
      Überschriften zur Strukturierung der übergeordneten Themen und bullet
      points für die darunter zusammengefassten Informationen </FORMAT> 



      <TON & STIL> Professionell und sachlich. Füge füge links ein, wenn
      relevant. </TON & STIL> 

model: openai/gpt-4o
